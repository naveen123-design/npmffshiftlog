<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>

  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:'DM Sans',sans-serif;
      background:#050d1a;
      color:#e8f0fe;
      min-height:100vh;
      display:flex;align-items:center;justify-content:center;
      text-align:center;
    }
    body::before{
      content:'';position:fixed;inset:0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 30%,rgba(30,111,255,0.10) 0%,transparent 60%),
        radial-gradient(ellipse 50% 40% at 80% 80%,rgba(245,120,20,0.08) 0%,transparent 60%);
      pointer-events:none;
    }
    .wrap{position:relative;z-index:1;padding:40px 24px}
    .logo{
      width:72px;height:72px;background:#fff;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      margin:0 auto 28px;
      box-shadow:0 0 32px rgba(30,111,255,0.4),0 8px 24px rgba(0,0,0,0.4);
      font-size:32px;
    }
    h1{
      font-family:'Rajdhani',sans-serif;
      font-size:42px;font-weight:700;
      letter-spacing:2px;text-transform:uppercase;
      margin-bottom:6px;
    }
    h1 span{color:#f59e0b}
    p{font-size:16px;color:#8aadd4;margin-bottom:32px}
    .bar{
      width:220px;height:3px;background:rgba(79,163,255,0.15);
      border-radius:2px;margin:0 auto 28px;overflow:hidden;
    }
    .bar-fill{
      height:100%;width:0;
      background:linear-gradient(90deg,#1e6fff,#4fa3ff);
      border-radius:2px;
      animation:load 1.8s ease forwards;
    }
    @keyframes load{to{width:100%}}
    a{
      display:inline-block;
      padding:13px 32px;
      background:linear-gradient(135deg,#0d47a1,#1e6fff);
      color:#fff;border-radius:10px;text-decoration:none;
      font-family:'Rajdhani',sans-serif;
      font-size:18px;font-weight:700;
      letter-spacing:2px;text-transform:uppercase;
      box-shadow:0 8px 24px rgba(13,71,161,0.45);
    }
    .note{margin-top:20px;font-size:13px;color:#445e7a}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">📋</div>
    <h1>Shift<span>Master</span></h1>
    <p>Redirecting to the application…</p>

      Open ShiftMaster →

    setTimeout(function(){
      window.location.replace("https://script.google.com/macros/s/AKfycbzbLN-rGRmfh3vcqO1-nmSopkFZi2W5Gfo5hiAKZvN5pC0bfNK-tJdLGprjDzGlTMkBpg/exec");
